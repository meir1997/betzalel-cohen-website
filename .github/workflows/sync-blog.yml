name: Sync Blog Posts from Blogspot

on:
  workflow_dispatch:
  push:
    paths:
      - 'scripts/fetch_blog.py'
      - '.github/workflows/sync-blog.yml'
  schedule:
    # Every 6 hours
    - cron: '0 */6 * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch all posts from Blogspot
        run: python scripts/fetch_blog.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add js/posts-data.js js/posts-content.js
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "סנכרון פוסטי בלוג מ-Blogspot feed"
            git push
          fi
