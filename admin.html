<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ניהול — בצלאל כהן</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="css/style.css?v=3" />
  <!-- Quill.js WYSIWYG Editor -->
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
  <style>
    /* ---- Admin-specific styles ---- */
    .admin-body { background: var(--parchment); min-height: 100vh; }

    .admin-wrap {
      max-width: 820px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    .admin-title {
      text-align: center;
      margin-bottom: 12px;
    }
    .admin-subtitle {
      text-align: center;
      color: var(--text-light);
      margin-bottom: 40px;
      font-size: 0.95rem;
    }

    /* Login */
    .login-card {
      max-width: 400px;
      margin: 120px auto;
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 48px 36px;
      text-align: center;
    }
    .login-card h2 { margin-bottom: 8px; }
    .login-card p { color: var(--text-light); margin-bottom: 24px; font-size: 0.95rem; }
    .login-card .login-error {
      color: #dc2626;
      font-size: 0.9rem;
      margin-top: 12px;
      display: none;
    }

    /* Form elements */
    .form-group {
      margin-bottom: 24px;
    }
    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--navy-dark);
      font-size: 0.95rem;
    }
    .form-group input[type="text"],
    .form-group input[type="date"],
    .form-group input[type="password"] {
      width: 100%;
      padding: 10px 40px 10px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: 'Heebo', sans-serif;
      font-size: 1rem;
      color: var(--text);
      background: var(--white);
      transition: border-color var(--transition);
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(183, 134, 42, 0.15);
    }

    /* Tags */
    .tags-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }
    .tag-checkbox {
      display: flex;
      align-items: center;
      gap: 4px;
      background: var(--gray-100);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background var(--transition);
    }
    .tag-checkbox:hover { background: var(--gold-pale); }
    .tag-checkbox input { accent-color: var(--gold); }
    .new-tag-row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .new-tag-row input {
      flex: 1;
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: 'Heebo', sans-serif;
      font-size: 0.9rem;
    }

    /* Image upload */
    .image-upload-area {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 24px;
      text-align: center;
      color: var(--text-light);
      cursor: pointer;
      transition: border-color var(--transition), background var(--transition);
    }
    .image-upload-area:hover {
      border-color: var(--gold);
      background: rgba(183, 134, 42, 0.04);
    }
    .image-upload-area.has-image {
      border-style: solid;
      border-color: var(--gold);
    }
    .image-upload-area img {
      max-height: 200px;
      margin: 0 auto;
      border-radius: var(--radius);
    }
    .image-upload-area input[type="file"] { display: none; }

    /* Quill editor */
    .editor-container {
      background: var(--white);
      border-radius: 0 0 var(--radius) var(--radius);
      min-height: 300px;
    }
    .ql-toolbar.ql-snow {
      border-radius: var(--radius) var(--radius) 0 0;
      border-color: var(--border);
      direction: ltr; /* toolbar icons LTR */
    }
    .ql-container.ql-snow {
      border-color: var(--border);
      border-radius: 0 0 var(--radius) var(--radius);
      font-family: 'Heebo', sans-serif;
      font-size: 1rem;
      min-height: 300px;
    }
    .ql-editor {
      direction: rtl;
      text-align: right;
      min-height: 300px;
      line-height: 1.75;
    }
    .ql-editor p { text-align: right; }
    .ql-snow .ql-editor blockquote {
      border-right: 4px solid var(--gold);
      border-left: none;
      padding-right: 16px;
      padding-left: 0;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 28px;
      border-radius: var(--radius);
      font-family: 'Heebo', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      transition: all var(--transition);
      cursor: pointer;
      border: none;
    }
    .btn-primary {
      background: var(--gold);
      color: var(--white);
    }
    .btn-primary:hover { background: var(--gold-light); }
    .btn-secondary {
      background: var(--navy);
      color: var(--white);
    }
    .btn-secondary:hover { background: var(--navy-light); }
    .btn-outline {
      background: transparent;
      border: 2px solid var(--navy);
      color: var(--navy);
    }
    .btn-outline:hover { background: var(--navy); color: var(--white); }
    .btn-sm { padding: 6px 16px; font-size: 0.85rem; }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .actions-row {
      display: flex;
      gap: 12px;
      margin-top: 32px;
      flex-wrap: wrap;
    }

    /* Preview modal */
    .preview-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 200;
      display: none;
      overflow-y: auto;
    }
    .preview-overlay.active { display: block; }
    .preview-modal {
      max-width: 780px;
      margin: 40px auto;
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      padding: 48px 36px;
      position: relative;
    }
    .preview-close {
      position: absolute;
      top: 16px;
      left: 16px;
      font-size: 1.5rem;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--gray-500);
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: background var(--transition);
    }
    .preview-close:hover { background: var(--gray-100); }
    .preview-content h1 { margin-bottom: 12px; }
    .preview-meta {
      color: var(--text-light);
      font-size: 0.9rem;
      margin-bottom: 24px;
    }
    .preview-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
    .preview-tag {
      background: var(--gold-pale);
      color: var(--gold);
      padding: 2px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .preview-content img { border-radius: var(--radius); margin-bottom: 20px; }
    .preview-body { line-height: 1.85; }
    .preview-body p { margin-bottom: 1.2em; }

    /* Status messages */
    .status-msg {
      padding: 16px 20px;
      border-radius: var(--radius);
      margin-top: 20px;
      font-size: 0.95rem;
      display: none;
    }
    .status-msg.success {
      background: #ecfdf5;
      border: 1px solid #6ee7b7;
      color: #065f46;
      display: block;
    }
    .status-msg.error {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #991b1b;
      display: block;
    }
    .status-msg.info {
      background: #eff6ff;
      border: 1px solid #93c5fd;
      color: #1e40af;
      display: block;
    }

    /* GitHub token prompt */
    .token-bar {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .token-bar label { font-weight: 600; font-size: 0.9rem; white-space: nowrap; }
    .token-bar input {
      flex: 1;
      min-width: 200px;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: monospace;
      font-size: 0.85rem;
    }
    .token-status {
      font-size: 0.85rem;
      color: var(--text-light);
    }
    .token-status.connected { color: #059669; }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Responsive */
    @media (max-width: 600px) {
      .admin-wrap { padding: 20px 16px 60px; }
      .login-card { margin: 60px 16px; padding: 32px 24px; }
      .preview-modal { margin: 20px 12px; padding: 28px 20px; }
      .actions-row { flex-direction: column; }
      .actions-row .btn { width: 100%; justify-content: center; }
      .token-bar { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body class="admin-body">

  <!-- ===== LOGIN SCREEN ===== -->
  <div id="loginScreen" class="login-card">
    <h2>ניהול האתר</h2>
    <p>הזן סיסמה כדי להיכנס לממשק הניהול</p>
    <div class="form-group" style="position:relative;">
      <input type="password" id="passwordInput" placeholder="סיסמה" autocomplete="off" />
      <button type="button" id="togglePassword" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1.2rem;color:var(--text-light);">👁</button>
    </div>
    <button class="btn btn-primary" id="loginBtn" style="width:100%;">כניסה</button>
    <div class="login-error" id="loginError">סיסמה שגויה</div>
  </div>

  <!-- ===== ADMIN PANEL ===== -->
  <div id="adminPanel" style="display:none;">
    <div class="admin-wrap">
      <h1 class="admin-title">פרסום פוסט חדש</h1>
      <p class="admin-subtitle">הפוסט יתפרסם ישירות באתר דרך GitHub</p>

      <!-- GitHub Token -->
      <div class="token-bar">
        <label>GitHub Token:</label>
        <input type="password" id="ghToken" placeholder="ghp_xxxxxxxxxxxx" />
        <button class="btn btn-sm btn-outline" id="saveTokenBtn">שמור</button>
        <span class="token-status" id="tokenStatus"></span>
      </div>

      <!-- Post Form -->
      <form id="postForm" autocomplete="off">
        <!-- Title -->
        <div class="form-group">
          <label for="postTitle">כותרת</label>
          <input type="text" id="postTitle" required placeholder="כותרת הפוסט" />
        </div>

        <!-- Date -->
        <div class="form-group">
          <label for="postDate">תאריך</label>
          <input type="date" id="postDate" required />
        </div>

        <!-- Tags -->
        <div class="form-group">
          <label>תגיות</label>
          <div class="tags-grid" id="tagsGrid"></div>
          <div class="new-tag-row">
            <input type="text" id="newTagInput" placeholder="הוסף תגית חדשה..." />
            <button type="button" class="btn btn-sm btn-outline" id="addTagBtn">הוסף</button>
          </div>
        </div>

        <!-- Image -->
        <div class="form-group">
          <label>תמונה ראשית</label>
          <div class="image-upload-area" id="imageUploadArea">
            <input type="file" id="imageFile" accept="image/*" />
            <div id="imagePlaceholder">
              <p style="font-size:2rem;margin-bottom:8px;">📷</p>
              <p>לחץ או גרור תמונה לכאן</p>
            </div>
            <img id="imagePreview" style="display:none;" alt="תצוגה מקדימה" />
          </div>
        </div>

        <!-- Content Editor -->
        <div class="form-group">
          <label>תוכן הפוסט</label>
          <div id="quillEditor"></div>
        </div>

        <!-- Actions -->
        <div class="actions-row">
          <button type="button" class="btn btn-secondary" id="previewBtn">תצוגה מקדימה</button>
          <button type="submit" class="btn btn-primary" id="publishBtn">
            <span id="publishText">פרסם באתר</span>
            <span id="publishSpinner" class="spinner" style="display:none;"></span>
          </button>
        </div>
      </form>

      <!-- Status -->
      <div class="status-msg" id="statusMsg"></div>
    </div>
  </div>

  <!-- ===== PREVIEW MODAL ===== -->
  <div class="preview-overlay" id="previewOverlay">
    <div class="preview-modal">
      <button class="preview-close" id="previewClose">&times;</button>
      <div class="preview-content" id="previewContent"></div>
    </div>
  </div>

  <script src="js/posts-data.js"></script>
  <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
